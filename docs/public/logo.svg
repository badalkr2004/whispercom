<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#7c3aed" opacity="0.12"/>
  <!-- Terminal bracket left -->
  <path d="M14 22 L6 32 L14 42" stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Terminal bracket right -->
  <path d="M50 22 L58 32 L50 42" stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Git branch dot (commit) -->
  <circle cx="32" cy="24" r="4" fill="#7c3aed"/>
  <!-- Git branch line down -->
  <line x1="32" y1="28" x2="32" y2="36" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
  <!-- AI sparkle left -->
  <circle cx="22" cy="38" r="2.5" fill="#a855f7" opacity="0.8"/>
  <!-- AI sparkle right -->
  <circle cx="42" cy="38" r="2.5" fill="#a855f7" opacity="0.8"/>
  <!-- Bottom merge dot -->
  <circle cx="32" cy="40" r="3" fill="#a855f7"/>
</svg>
